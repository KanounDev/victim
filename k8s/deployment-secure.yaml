apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim-app
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victim-app
  template:
    metadata:
      labels:
        app: victim-app
    spec:
      containers:
      - name: app
        image: victim-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: victim-app
spec:
  selector:
    app: victim-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: NodePort
